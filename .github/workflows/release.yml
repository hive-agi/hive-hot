name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    env:
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_DEPLOY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file not found"
            exit 1
          fi
          VERSION=$(tr -d '[:space:]' < VERSION)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      # Tagging and Clojars publication are gated INDEPENDENTLY. A repo can
      # already carry its tag while never having been published to Clojars, so a
      # single tag-based gate would silently skip the deploy forever.
      - name: Check if tag exists
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version is on Clojars
        id: clojars
        run: |
          V="${{ steps.version.outputs.version }}"
          URL="https://repo.clojars.org/io/github/hive-agi/hive-hot/${V}/hive-hot-${V}.pom"
          if curl -sfI "$URL" -o /dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$LIB $V is already on Clojars — deploy will be skipped (Clojars releases are immutable)."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.tag.outputs.exists == 'false' || steps.clojars.outputs.published == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Clojure
        if: steps.tag.outputs.exists == 'false' || steps.clojars.outputs.published == 'false'
        uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: latest

      - name: Build jar
        if: steps.tag.outputs.exists == 'false' || steps.clojars.outputs.published == 'false'
        run: clojure -T:build jar

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: target/hive-hot-${{ steps.version.outputs.version }}.jar

      - name: Deploy to Clojars
        if: steps.clojars.outputs.published == 'false' && env.CLOJARS_USERNAME != ''
        run: clojure -T:build deploy
